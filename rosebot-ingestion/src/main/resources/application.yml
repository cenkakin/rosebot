spring:
  datasource:
    url: ${prop.spring.datasource.url}
    username: ${prop.spring.datasource.username}
    password: ${prop.spring.datasource.password}
  jooq:
    sql-dialect: POSTGRES
  ai:
    openai:
      api-key: ${prop.ai.openai.api-key}
      chat:
        base-url: ${prop.ai.openai.chat.base-url}
        options:
          model: ${prop.ai.openai.chat.model}
          temperature: 0.2
      embedding:
        base-url: ${prop.ai.openai.embedding.base-url}
        options:
          model: ${prop.ai.openai.embedding.model}

server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: health
